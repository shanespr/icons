<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CSS Icons Demo</title>
  <link rel="stylesheet" href="./dist/icons.css">
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      padding: 2rem;
    }
    h1 { margin: 0 0 1rem; font-size: 1.5rem; }
    p { margin: 0 0 1.5rem; color: #334155; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 0.75rem;
    }
    .card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.625rem;
      font-size: 0.875rem;
    }
    .card .ss { font-size: 1.25rem; color: #0f172a; }
    code { background: #eef2ff; padding: 0.125rem 0.375rem; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>CSS Icons Demo</h1>
  <p>All icons use <code>.ss</code> + icon class (for example <code>.ss-airplane</code>).</p>
  <div class="grid">
    <div class="card"><i class="ss ss-airplane"></i><span>ss-airplane</span></div>
    <div class="card"><i class="ss ss-google-chrome-logo"></i><span>ss-google-chrome-logo</span></div>
    <div class="card"><i class="ss ss-warning" style="color:#dc2626"></i><span>ss-warning</span></div>
    <div class="card"><i class="ss ss-check-square-offset"></i><span>ss-check-square-offset</span></div>
    <div class="card"><i class="ss ss-user-circle"></i><span>ss-user-circle</span></div>
    <div class="card"><i class="ss ss-twitter-logo"></i><span>ss-twitter-logo</span></div>
    <div class="card"><i class="ss ss-circle-notch ss-spin"></i><span>ss-circle-notch + ss-spin</span></div>
    <div class="card"><i class="ss ss-heart" style="color:#e11d48"></i><span>ss-heart</span></div>
  </div>
</body>
</html>
